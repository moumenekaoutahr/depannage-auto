api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        jsonld: ["application/ld+json"]
        html: ["text/html"]
        jsonapi: [application/vnd.api+json]
        json: ['application/json', 'multipart/form-data']